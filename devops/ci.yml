trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: COMMON
  - name: buildConfiguration
    value: 'Release'
  - name: dotnetVersion
    value: '10.0.x'

stages:
  - stage: BuildValidation
    displayName: 'Build Validation'
    jobs:
      - job: Build
        displayName: 'Build Solution'
        steps:
          - checkout: self

          - template: build-validation.yml
            parameters:
              buildConfiguration: $(buildConfiguration)

  # Lint & Security
  - stage: LintSecurity
    displayName: 'Lint & Security'
    jobs:
      - job: LintSecurity
        displayName: 'Lint & Security'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - template: lint-security.yml
            parameters:
              buildConfiguration: $(buildConfiguration)

  - stage: CoreTests
    displayName: 'Core Tests'
    dependsOn: BuildValidation
    jobs:
      - job: CoreTests
        displayName: 'Run Core Tests'
        steps:
          - checkout: self

          - template: core-tests.yml
            parameters:
              buildConfiguration: $(buildConfiguration)